categories:
- NDA
conversations:
- - What is NDA?
  - NDA stands for National Defence Academy. It is a premier joint services academy of the Indian Armed Forces located at Khadakwasla, Pune. It trains cadets for the Indian Army, Navy, and Air Force.
- - What is the eligibility for NDA?
  - To be eligible for NDA, you must be an unmarried male or female Indian citizen aged 16.5 to 19.5 years. You should have passed 10+2 or equivalent with Physics and Mathematics for Air Force and Navy wings, and 10+2 for Army wing.
- - What is the NDA exam pattern?
  - NDA written exam has two papers: Mathematics (300 marks, 2.5 hours) and General Ability Test (600 marks, 2.5 hours). Total marks are 900. After clearing written, candidates appear for SSB interview worth 900 marks. Total selection: 1800 marks.
- - How many times is NDA exam held per year?
  - NDA exam is conducted twice a year by UPSC - NDA I (April) and NDA II (September). Results and SSB interviews are conducted by Services Selection Board subsequently.
- - What subjects are in NDA syllabus?
  - NDA Maths covers Algebra, Matrices, Trigonometry, Calculus, Statistics. GAT covers English, Physics, Chemistry, History, Geography, General Science, Current Events, and General Awareness.
- - What is the NDA physical standard?
  - NDA physical standards require height minimum 157 cm for Army/Navy, 162 cm for Air Force. Weight proportionate to height. Good eyesight: 6/6 for Air Force, 6/6 corrected for others. No colour blindness.
- - How should I prepare for NDA maths?
  - For NDA Maths, focus on NCERT books of Class 11 and 12. Practice previous year papers. Key topics: Sets, Trigonometry, Matrices, Determinants, Integral Calculus, Differential Equations, Probability, Statistics. Solve at least 10 years papers.
- - What is NDA training period?
  - NDA training is for 3 years (6 semesters). After NDA, cadets join their respective service academies - IMA for Army, INA for Navy, AFA for Air Force for further training of 1-1.5 years.

- NDA_Career
conversations:
- - What rank do NDA graduates get?
  - NDA graduates are commissioned as Lieutenant in Army, Sub Lieutenant in Navy, and Flying Officer in Air Force after completing training at NDA and their respective service academies.
- - Is NDA better than CDS?
  - NDA is for 10+2 pass students and provides a graduation degree along with military training. CDS is for graduates. NDA gives more time in service and better promotion prospects due to earlier commissioning age.

- CDS
conversations:
- - What is CDS exam?
  - CDS stands for Combined Defence Services. It is conducted by UPSC twice a year to recruit officers into Indian Military Academy (IMA), Officers Training Academy (OTA), Indian Naval Academy (INA), and Air Force Academy (AFA).
- - What is CDS eligibility?
  - For IMA and Officers Training Academy: Graduate in any discipline. For Indian Naval Academy: Engineering degree. For Air Force Academy: Graduation with Physics and Mathematics at 10+2 level or BE/B.Tech. Age: 19-24 years for IMA, 19-23 for Navy/Air Force.
- - What is CDS exam pattern?
  - CDS has 3 papers for IMA/INA/AFA: English (100 marks), General Knowledge (100 marks), Elementary Mathematics (100 marks). For OTA: English and GK only (100 marks each). Each paper is 2 hours. Negative marking of 1/3 applies.
- - How to prepare for CDS?
  - For CDS preparation: Read newspaper daily for current affairs, revise NCERT books for GK and Maths, practice English grammar and comprehension. Solve previous 5-10 years question papers. Focus on: Indian History, Geography, Economy, Defence, Science.
- - What is CDS training period?
  - IMA training is 18 months, INA training is 3 years, AFA training is 74 weeks, OTA (SSC) training is 11 months. After training, candidates are commissioned as officers in their respective services.

- AFCAT
conversations:
- - What is AFCAT?
  - AFCAT stands for Air Force Common Admission Test. It is conducted by Indian Air Force twice a year to recruit officers in Flying, Technical, and Ground Duty branches of the Indian Air Force.
- - What is AFCAT eligibility?
  - For Flying Branch: Graduate with Physics and Mathematics at 10+2 level, age 20-24 years. For Technical Branch: BE/B.Tech in relevant engineering, age 20-26 years. For Ground Duty: Graduate in relevant discipline, age 20-26 years.
- - What is AFCAT syllabus?
  - AFCAT covers General Awareness, Verbal Ability in English, Numerical Ability, Reasoning and Military Aptitude Test. Questions from Indian History, Sports, Geography, Environment, Science, Defence, Current Affairs, and Basic Science.
- - What is EKT in AFCAT?
  - EKT stands for Engineering Knowledge Test. It is an additional test for Technical Branch candidates in AFCAT. It tests subject knowledge in Mechanical, Electronics and Communication, or Computer Science Engineering.

- Agniveer
conversations:
- - What is Agniveer scheme?
  - Agniveer is a short-term military service scheme launched by the Government of India in June 2022. Under this scheme, youth aged 17.5 to 21 years are recruited into the Armed Forces for a period of 4 years.
- - What happens after 4 years in Agniveer?
  - After 4 years of service, 25% of Agniveers are retained as regular soldiers based on merit and organisational requirement. The remaining 75% receive a Seva Nidhi package of approximately 11.71 lakhs and are released.
- - What is the Agniveer eligibility?
  - Agniveer eligibility: Age 17.5-21 years, Class 10 pass for General Duty, Class 12 for technical trades. Must meet physical and medical standards as per Army, Navy or Air Force requirements. Must be Indian citizen.
- - What are benefits of Agniveer scheme?
  - Agniveer benefits include: Package of Rs 30,000-40,000 per month increasing each year, Non-contributory life insurance of Rs 48 lakhs, Seva Nidhi of Rs 11.71 lakhs after 4 years, priority in CAPFs recruitment, skill certificates recognised for civilian jobs.
- - What is Agniveer salary?
  - Agniveer salary in Year 1: Rs 30,000/month (In hand: Rs 21,000 + Rs 9,000 in corpus fund). Year 2: Rs 33,000. Year 3: Rs 36,500. Year 4: Rs 40,000. Plus allowances for risk, hardship duty.

- SSB
conversations:
- - What is SSB interview?
  - SSB stands for Services Selection Board. It is a 5-day psychological and personality assessment conducted to select officers for the Indian Armed Forces. It evaluates Officer Like Qualities (OLQs) through various tests and interviews.
- - What happens in SSB Day 1?
  - SSB Day 1 consists of Officer Intelligence Rating (OIR) Test - a verbal and non-verbal intelligence test, and Picture Perception and Discussion Test (PPDT) - where candidates write a story on a picture and discuss it in group.
- - What happens in SSB Day 2?
  - SSB Day 2 consists of Psychological Tests: Thematic Apperception Test (TAT), Word Association Test (WAT), Situation Reaction Test (SRT), and Self Description Test (SDT). These assess personality and thinking patterns.
- - What is TAT in SSB?
  - TAT stands for Thematic Apperception Test. Candidate is shown 12 pictures (11 picture + 1 blank) and must write a story for each in 4 minutes. Stories should have a positive theme, show leadership, initiative, and problem-solving.
- - What is WAT in SSB?
  - WAT stands for Word Association Test. 60 words are shown one by one (15 seconds each). Candidate writes the first sentence that comes to mind. Responses should show positive thinking, leadership, and constructive approach.
- - What is SRT in SSB?
  - SRT stands for Situation Reaction Test. 60 practical life situations are given in 30 minutes. Candidate writes what they would do. Responses should show officer-like qualities: initiative, responsibility, leadership, social adaptability.
- - What is GTO in SSB?
  - GTO stands for Group Testing Officer. GTO tasks are conducted on Day 3 and 4: Group Discussion, Group Planning Exercise, Progressive Group Task, Half Group Task, Individual Obstacles, Command Task, Final Group Task, Lecture. Tests leadership and teamwork.
- - What are Officer Like Qualities?
  - Officer Like Qualities (OLQs) assessed in SSB are: Effective Intelligence, Reasoning Ability, Organising Ability, Power of Expression, Social Adaptability, Cooperation, Sense of Responsibility, Initiative, Self Confidence, Speed of Decision, Ability to Influence the Group, Liveliness, Determination, Courage, Stamina, and Military Bearing.
- - What is Conference in SSB?
  - The Conference is held on Day 5. All SSB assessors - Interviewing Officer, Psychologist, and GTO - meet to discuss each candidate. The President chairs the conference. Candidates are called in one by one and asked if they have any complaints. Final recommendation is given.
- - How to prepare for SSB interview?
  - SSB preparation tips: Read newspapers daily, work on current affairs and defence knowledge, improve communication skills, practice group discussions, work on physical fitness, read about Officer Like Qualities, practice TAT/WAT/SRT at home, be genuine and consistent.

- IndianArmy
conversations:
- - What are the ranks in Indian Army?
  - Indian Army officer ranks (lowest to highest): Second Lieutenant, Lieutenant, Captain, Major, Lieutenant Colonel, Colonel, Brigadier, Major General, Lieutenant General, General, and Field Marshal (honorary, wartime). JCO ranks: Naib Subedar, Subedar, Subedar Major.
- - What are the main commands of Indian Army?
  - Indian Army has 7 commands: Northern Command (Udhampur), Western Command (Chandimandir), South Western Command (Jaipur), Southern Command (Pune), Eastern Command (Kolkata), Central Command (Lucknow), Army Training Command (Shimla).
- - What are famous military operations of Indian Army?
  - Famous Indian Army operations: Operation Vijay (Kargil 1999), Operation Meghdoot (Siachen 1984), Operation Blue Star (1984), Operation Pawan (Sri Lanka 1987-90), Operation Cactus (Maldives 1988), Operation Khukri (Sierra Leone 2000), Operation Trident (1971).
- - What is Operation Sindoor?
  - Operation Sindoor was a precision military strike conducted by India in May 2025 targeting terrorist infrastructure in Pakistan and Pakistan-Occupied Kashmir in response to the Pahalgam terror attack. It demonstrated India's commitment to zero tolerance against terrorism.
- - Tell me about Indian Army regiments.
  - Major Indian Army infantry regiments include: Punjab Regiment, Rajputana Rifles, Grenadiers, Maratha Light Infantry, Sikh Regiment, Dogra Regiment, Garhwal Rifles, Kumaon Regiment, Assam Regiment, Bihar Regiment, Madras Regiment, Rajput Regiment, and many more.

- IndianNavy
conversations:
- - What are Indian Navy ranks?
  - Indian Navy officer ranks: Sub Lieutenant, Lieutenant, Lieutenant Commander, Commander, Captain, Commodore, Rear Admiral, Vice Admiral, Admiral, Admiral of the Fleet (wartime). Sailor ranks include: Seaman, Leading Seaman, Petty Officer, Chief Petty Officer, etc.
- - What are the major commands of Indian Navy?
  - Indian Navy has 3 main commands: Western Naval Command (Mumbai), Eastern Naval Command (Visakhapatnam), Southern Naval Command (Kochi - training). Plus Andaman and Nicobar Command (Port Blair) as tri-service command.
- - What are major Indian Navy ships?
  - Major Indian Navy warships: INS Vikrant (aircraft carrier), INS Vikramaditya (aircraft carrier), INS Visakhapatnam (destroyer), INS Chennai (destroyer), INS Arihant (nuclear submarine), INS Chakra (nuclear submarine), INS Shivalik (frigate class), INS Talwar (frigate).
- - What missiles does Indian Navy use?
  - Indian Navy uses: BrahMos supersonic cruise missile, Klub missile, Barak-8 air defence missile, Nirbhay cruise missile, Shaurya missile. Torpedoes: Varunastra (indigenous), Heavyweight Torpedo. Also uses P-8I Poseidon maritime patrol aircraft.

- IndianAirForce
conversations:
- - What are Indian Air Force ranks?
  - IAF officer ranks: Flying Officer, Flight Lieutenant, Squadron Leader, Wing Commander, Group Captain, Air Commodore, Air Vice Marshal, Air Marshal, Air Chief Marshal, Marshal of the Air Force (wartime). Airman ranks from Aircraftman to Master Warrant Officer.
- - What are the major commands of Indian Air Force?
  - IAF has 7 commands: Western Air Command (Delhi), South Western Air Command (Gandhinagar), Southern Air Command (Thiruvananthapuram), Eastern Air Command (Shillong), Central Air Command (Allahabad), Training Command (Bangalore), Maintenance Command (Nagpur).
- - What fighter aircraft does IAF operate?
  - IAF fighter aircraft: Rafale (36 jets), Su-30MKI (250+ jets), MiG-29, Mirage 2000, Tejas (LCA - indigenous), Jaguar. Transport: C-17 Globemaster, C-130J Super Hercules, AN-32. Helicopters: Apache, Chinook, Mi-17, ALH Dhruv.
- - What is Tejas aircraft?
  - Tejas is India's indigenous Light Combat Aircraft (LCA) developed by HAL and DRDO. It is a 4th generation multirole fighter. Tejas Mk1A variant with upgraded avionics and AESA radar is being inducted. It uses EL/M-2032 radar and can carry Derby, R-73 missiles.

- Fitness
conversations:
- - How to improve running for defence exams?
  - To improve running: Start with 2-3 km daily and gradually increase. Practice interval training: sprint 100m, walk 100m repeatedly. Build stamina with long slow runs on weekends. Aim for 1.6 km in under 7 minutes for Army. Proper warm-up and cool-down is essential.
- - What is the fitness standard for Indian Army?
  - Indian Army physical fitness: 1.6 km run (varies by age/entry), pushups (minimum 40+), situps (minimum 40+), pull-ups (minimum 6+), beam balance, 9 feet ditch jump. NDA requires better standards. Regular practice and progressive overload is key.
- - How to increase pushups for defence?
  - To increase pushups: Practice daily, use pyramid sets (1-2-3-...-10-...-3-2-1), do negative pushups for strength, practice different variations (diamond, wide grip). Rest adequately. Aim for 50+ pushups in 2 minutes. Combine with shoulder and chest exercises.
- - What diet should a defence aspirant follow?
  - Defence aspirant diet: High protein (eggs, chicken, daal, milk, paneer), complex carbohydrates (rice, chapati, oats), healthy fats (nuts, seeds). Avoid junk food and alcohol. Stay hydrated (3-4 liters water daily). Eat 4-5 small meals. Pre-workout: banana/dates. Post-workout: protein-rich food.

- MilitaryTech
conversations:
- - What is BrahMos missile?
  - BrahMos is a supersonic cruise missile jointly developed by India (DRDO) and Russia (NPO Mashinostroyeniya). It has a range of 290-500 km, speed of Mach 2.8-3, and can be launched from land, sea, submarine and air platforms. It carries a 200-300 kg warhead.
- - What is DRDO?
  - DRDO stands for Defence Research and Development Organisation. It is India's premier defence R&D agency under Ministry of Defence. It has developed systems like Agni, Prithvi, Akash missiles, LCA Tejas, Arjun tank, INS Arihant submarine, INSAS rifle, and many more.
- - What is Agni missile series?
  - Agni is India's family of nuclear-capable ballistic missiles: Agni-I (700km range), Agni-II (2000km), Agni-III (3000km), Agni-IV (4000km), Agni-V (5000+km ICBM class), Agni-P (1000km pinpoint accuracy). They form India's nuclear deterrence capability.
- - What is INS Arihant?
  - INS Arihant is India's first indigenously built nuclear-powered ballistic missile submarine (SSBN). It was commissioned in 2016. It completes India's nuclear triad (land, sea, air-based nuclear delivery). It carries K-15 Sagarika and K-4 submarine-launched ballistic missiles.
- - What is Pinaka rocket system?
  - Pinaka is an indigenously developed multi-barrel rocket launch system by DRDO. It can fire salvos of 12 rockets in 44 seconds covering 3.9 km² area. Range: 37-90 km. It performed excellently in Kargil War 1999. Pinaka Mk-II has enhanced range and accuracy.

- GallantryAwards
conversations:
- - What is Param Vir Chakra?
  - Param Vir Chakra (PVC) is India's highest military honour, awarded for the most conspicuous bravery or some daring or pre-eminent act of valour or self-sacrifice in the presence of the enemy. It is equivalent to Victoria Cross. Only 21 PVCs have been awarded, most posthumously.
- - What is Vir Chakra?
  - Vir Chakra is India's third highest wartime gallantry award after Param Vir Chakra and Maha Vir Chakra. It is awarded for acts of bravery and self-sacrifice in the presence of the enemy, whether on land, at sea or in the air.
- - Who was the first PVC recipient?
  - Major Somnath Sharma was the first recipient of Param Vir Chakra. He was awarded the PVC posthumously for his outstanding bravery in the Battle of Badgam on 3 November 1947 during the first Indo-Pak war in Jammu and Kashmir.

- CurrentAffairs
conversations:
- - What is Operation Sindoor?
  - Operation Sindoor (May 2025) was India's precision military operation striking 9 terrorist camps across Pakistan and POK following the Pahalgam terror attack. It demonstrated India's new doctrine of swift, measured retaliation against cross-border terrorism without escalating to full war.
- - What are recent defence exercises by India?
  - Recent major India defence exercises: Tasman Saber (India-Australia-USA), Malabar (India-USA-Japan), INDRA (India-Russia), Shakti (India-France), Garuda Shakti (India-Indonesia), Yudh Abhyas (India-USA), Dharma Guardian (India-Japan), SIMBEX (India-Singapore Navy).
- - What is the defence budget of India 2025?
  - India's Defence Budget for 2025-26 was approximately Rs 6.81 lakh crore, about 2.1% of GDP. It includes allocations for modernisation, capital expenditure for new weapons, salaries and pensions. India is one of the top 5 defence spenders globally.

